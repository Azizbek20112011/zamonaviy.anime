<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime App</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #0f172a;
    color: white;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.search-box {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
}

input {
    padding: 10px;
    width: 250px;
    border-radius: 10px 0 0 10px;
    border: none;
    outline: none;
}

button {
    padding: 10px 15px;
    border: none;
    background: #9333ea;
    color: white;
    border-radius: 0 10px 10px 0;
    cursor: pointer;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.card {
    background: #1e293b;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

.card h3 {
    padding: 10px;
    font-size: 16px;
}

.card p {
    padding: 0 10px 10px;
    font-size: 14px;
    opacity: 0.7;
}
</style>

</head>
<body>

<h1>🎌 Anime Qidiruv</h1>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Anime nomini yozing...">
    <button onclick="searchAnime()">Qidirish</button>
</div>

<div class="grid" id="animeList"></div>

<script>
async function searchAnime() {
    const query = document.getElementById("searchInput").value;
    const res = await fetch(`https://api.jikan.moe/v4/anime?q=${query}`);
    const data = await res.json();

    const list = document.getElementById("animeList");
    list.innerHTML = "";

    data.data.forEach(anime => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${anime.images.jpg.image_url}">
            <h3>${anime.title}</h3>
            <p>⭐ ${anime.score || "Noma'lum"}</p>
        `;

        list.appendChild(card);
    });
}
</script>

</body>
</html>
